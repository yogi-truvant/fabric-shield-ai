name: FabricShield AI - CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ODBC runtime
        run: |
          # GitHub's ubuntu runner ships a Microsoft apt source that intermittently
          # returns 403 and breaks `apt-get update`. Remove ANY apt source that points
          # at packages.microsoft.com, then install unixodbc from the standard Ubuntu repos.
          sudo grep -rl "packages.microsoft.com" /etc/apt/sources.list.d/ 2>/dev/null \
            | sudo xargs -r rm -f || true
          sudo apt-get update
          sudo apt-get install -y unixodbc
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx ruff
      - name: Lint (ruff)
        run: ruff check . --select E,W,F --ignore E501
      - name: Run tests
        env:
          AZURE_CLIENT_ID: test-client-id
          AZURE_TENANT_ID: test-tenant-id
          AZURE_CLIENT_SECRET: test-secret
          COSMOS_ENDPOINT: https://localhost:8081
          COSMOS_USE_MANAGED_IDENTITY: "false"
          COSMOS_KEY: test-key
          KEYVAULT_URL: ""
          JWT_AUDIENCE: test-audience
        run: pytest tests/ -v --tb=short

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install
      - run: npx eslint src --ext .js,.jsx --max-warnings 0 || true
      - name: Build
        env:
          VITE_AZURE_CLIENT_ID: test-client-id
          VITE_API_BASE_URL: https://api.example.com/api/v1
          VITE_REDIRECT_URI: https://app.example.com
        run: npm run build

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Bandit
        run: |
          pip install bandit
          bandit -r backend/ -ll -x backend/tests -f json -o bandit-report.json || true
      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --format json -o pip-audit-report.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: "*.json"

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_DEPLOYER }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - name: Package backend
        run: zip -rq app.zip backend requirements.txt -x "*.pyc" "**/__pycache__/*" "backend/tests/*"
      - name: Resolve backend app name
        id: appname
        run: echo "name=$(az webapp list -g ${{ env.RESOURCE_GROUP }} --query "[?contains(name,'api')].name" -o tsv | head -1)" >> $GITHUB_OUTPUT
      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ steps.appname.outputs.name }}
          package: app.zip
      - name: Ensure startup command
        run: az webapp config set -g ${{ env.RESOURCE_GROUP }} -n ${{ steps.appname.outputs.name }} --startup-file "uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 2"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [deploy-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_DEPLOYER }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - name: Resolve app names
        id: appnames
        run: |
          echo "backend=$(az webapp list -g ${{ env.RESOURCE_GROUP }} --query "[?contains(name,'api')].name" -o tsv | head -1)" >> $GITHUB_OUTPUT
          echo "frontend=$(az webapp list -g ${{ env.RESOURCE_GROUP }} --query "[?contains(name,'ui')].name" -o tsv | head -1)" >> $GITHUB_OUTPUT
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_AZURE_CLIENT_ID: ${{ env.AZURE_CLIENT_ID }}
          VITE_API_BASE_URL: https://${{ steps.appnames.outputs.backend }}.azurewebsites.net/api/v1
          VITE_REDIRECT_URI: https://${{ steps.appnames.outputs.frontend }}.azurewebsites.net
        run: |
          npm install
          npm run build
      - name: Deploy frontend
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ steps.appnames.outputs.frontend }}
          package: frontend/dist/

  smoke-test:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_DEPLOYER }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - name: Health check
        run: |
          APP=$(az webapp list -g ${{ env.RESOURCE_GROUP }} --query "[?contains(name,'api')].name" -o tsv | head -1)
          for i in 1 2 3 4 5 6; do
            S=$(curl -s -o /dev/null -w "%{http_code}" "https://$APP.azurewebsites.net/health"); echo "try $i: $S"
            [ "$S" = "200" ] && exit 0; sleep 20
          done
          echo "health check failed"; exit 1
